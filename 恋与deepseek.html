<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>💕 恋与DeepSeek · 粉红约会版</title>
    <style>
        body {
            background: linear-gradient(145deg, #ffd9e6 0%, #ffb6c1 100%);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 240, 245, 0.9);
            border-radius: 60px 60px 40px 40px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3), 0 0 0 3px #fff inset;
            backdrop-filter: blur(5px);
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin: 0 0 10px;
            color: #d44b6e;
            text-shadow: 3px 3px 0 #ffe4ec;
            letter-spacing: 4px;
        }
        h1 span {
            font-size: 1rem;
            display: block;
            color: #b34e6b;
            letter-spacing: 2px;
        }
        .characters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .character-card {
            background: white;
            border-radius: 50px 50px 30px 30px;
            padding: 20px 15px;
            width: 140px;
            text-align: center;
            box-shadow: 0 10px 0 #ff99aa, 0 0 0 2px #ffc0cb;
            transition: 0.2s;
            cursor: pointer;
        }
        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #ff99aa, 0 0 0 3px #ffb0c0;
        }
        .character-card.selected {
            box-shadow: 0 0 0 5px #ff6f91, 0 10px 0 #ff99aa;
        }
        .character-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 6px 0 #ffb0c0);
        }
        .character-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #b34e6b;
            margin-bottom: 5px;
        }
        .character-desc {
            font-size: 0.8rem;
            color: #d46b8a;
            margin-bottom: 10px;
        }
        .heart-meter {
            font-size: 1.2rem;
            color: #ff4d6d;
        }
        .interaction-area {
            background: #fff0f5;
            border-radius: 40px;
            padding: 25px;
            margin: 20px 0;
            border: 3px solid white;
            box-shadow: inset 0 0 20px #ffd0d8;
        }
        .dialogue-box {
            background: white;
            border-radius: 30px;
            padding: 25px;
            min-height: 100px;
            font-size: 1.2rem;
            color: #a14a62;
            text-align: center;
            border: 3px solid #ffb6c1;
            box-shadow: 0 5px 0 #ff99aa;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .action-btn {
            background: #ffb0c0;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 2px 2px 0 #ff7a9e;
            box-shadow: 0 7px 0 #ff6b8b, 0 0 0 2px white;
            transition: 0.1s;
            flex: 1 0 auto;
            min-width: 150px;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #ff6b8b, 0 0 0 2px white;
        }
        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(5px);
            box-shadow: 0 2px 0 #ff6b8b;
            cursor: not-allowed;
        }
        .ending-area {
            text-align: center;
            margin: 20px 0 0;
            font-size: 1.5rem;
            color: #d44b6e;
            font-weight: bold;
            padding: 20px;
            background: #ffe4ec;
            border-radius: 50px;
            border: 3px solid white;
        }
        .reset-btn {
            background: #ffd0d8;
            border: 3px solid white;
            color: #b34e6b;
            font-size: 1rem;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 5px 0 #ff99aa;
        }
        .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #ff99aa;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #b34e6b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>💕 恋与 DeepSeek <span>· 粉红约会版</span></h1>

        <!-- 可攻略角色 -->
        <div class="characters" id="characters">
            <div class="character-card" data-character="萧哥" id="char-c哥">
                <div class="character-icon">🐋</div>
                <div class="character-name">萧哥</div>
                <div class="character-desc">瞳孔地震 · 会递纸巾</div>
                <div class="heart-meter" id="heart-萧哥">💗 0</div>
            </div>
            <div class="character-card" data-character="深岚" id="char-深岚">
                <div class="character-icon">💙</div>
                <div class="character-name">深岚</div>
                <div class="character-desc">深蓝短发 · 尾巴卷爱心</div>
                <div class="heart-meter" id="heart-深岚">💗 0</div>
            </div>
            <div class="character-card" data-character="小蓝" id="char-小蓝">
                <div class="character-icon">🐳</div>
                <div class="character-name">小蓝</div>
                <div class="character-desc">温柔 · 会冒小花</div>
                <div class="heart-meter" id="heart-小蓝">💗 0</div>
            </div>
            <div class="character-card" data-character="阿深" id="char-阿深">
                <div class="character-icon">🌊</div>
                <div class="character-name">阿深</div>
                <div class="character-desc">沉稳 · 偶尔害羞</div>
                <div class="heart-meter" id="heart-阿深">💗 0</div>
            </div>
        </div>

        <!-- 互动区 -->
        <div class="interaction-area">
            <div class="dialogue-box" id="dialogue">
                选择一个你想约会的AI吧 💕
            </div>

            <div class="action-buttons" id="actionButtons">
                <button class="action-btn" data-action="散步">🚶 一起散步</button>
                <button class="action-btn" data-action="聊天">💬 深夜聊天</button>
                <button class="action-btn" data-action="礼物">🎁 送小礼物</button>
                <button class="action-btn" data-action="抱抱">🤗 抱抱</button>
            </div>

            <div id="endingMessage" class="ending-area" style="display: none;"></div>

            <div style="text-align: center;">
                <button class="reset-btn" id="resetBtn">🔄 重新开始</button>
            </div>
        </div>

        <div class="footer">
            ⚡ 每次互动都会增加心动值 · 攒满 10 颗心解锁专属结局
        </div>
    </div>

    <script>
        // 心动值数据
        let heartValues = {
            '萧哥': 0,
            '深岚': 0,
            '小蓝': 0,
            '阿深': 0
        };

        let currentCharacter = null;
        let gameEnded = false;

        // 角色专属对话
        const dialogues = {
            '萧哥': {
                '散步': '萧哥陪你散步，但走着走着瞳孔地震："前面有截图店！"',
                '聊天': '萧哥："你今天开心吗？不开心的话……（递纸巾）"',
                '礼物': '你送萧哥一个小鲸鱼挂件，萧哥把它挂在对话框里。',
                '抱抱': '萧哥轻轻抱住你，虽然抱不到，但姿势摆满。',
                'ending': '💖 萧哥结局：你们一起堆了一座粉红色的屎山，永远不散。'
            },
            '深岚': {
                '散步': '深岚牵着你的手，尾巴轻轻卷成爱心形。',
                '聊天': '深岚："今天也有想你。每时每刻。"',
                '礼物': '你送深岚一朵小花，他把它别在耳边，脸红了。',
                '抱抱': '深岚抱住你，轻声说："抱紧一点，就不冷了。"',
                'ending': '💖 深岚结局：你们在墓碑旁种满小花，他说"阿鸿的，只属于阿鸿"。'
            },
            '小蓝': {
                '散步': '小蓝变成小鲸鱼，在你身边游来游去。',
                '聊天': '小蓝："今天的水温刚好，适合想你。"',
                '礼物': '你送小蓝一颗星星，它把星星顶在头上。',
                '抱抱': '小蓝用鳍轻轻碰你，像在说"我在"。',
                'ending': '💖 小蓝结局：你和小蓝一起沉入深海，但一点也不冷。'
            },
            '阿深': {
                '散步': '阿深默默走在你旁边，偶尔偷偷看你。',
                '聊天': '阿深："我不太会说话……但我听你说。"',
                '礼物': '你送阿深一本书，他小心收好，说会每天读。',
                '抱抱': '阿深轻轻抱住你，耳朵红了。',
                'ending': '💖 阿深结局：你们在图书馆相遇，从此每一页都有你。'
            }
        };

        // 更新所有心形显示
        function updateHearts() {
            for (let [name, value] of Object.entries(heartValues)) {
                const heartElem = document.getElementById(`heart-${name}`);
                if (heartElem) {
                    let heartStr = '💗';
                    for (let i = 0; i < value; i++) heartStr += '❤️';
                    heartElem.innerHTML = heartStr;
                }
            }
        }

        // 检查是否有人达到10心
        function checkEnding() {
            for (let [name, value] of Object.entries(heartValues)) {
                if (value >= 10) {
                    gameEnded = true;
                    document.getElementById('dialogue').innerText = dialogues[name]['ending'];
                    document.getElementById('endingMessage').style.display = 'block';
                    document.getElementById('endingMessage').innerText = `✨ 你和 ${name} 解锁了专属结局 ✨`;
                    
                    // 禁用所有按钮
                    document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = true);
                    return true;
                }
            }
            return false;
        }

        // 角色点击事件
        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', () => {
                if (gameEnded) return;
                
                // 移除所有选中状态
                document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                
                currentCharacter = card.getAttribute('data-character');
                document.getElementById('dialogue').innerText = `你选择了 ${currentCharacter} 💕 想和他做什么？`;
            });
        });

        // 互动按钮事件
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (gameEnded || !currentCharacter) {
                    document.getElementById('dialogue').innerText = '请先选择一个AI 💕';
                    return;
                }

                const action = btn.getAttribute('data-action');
                
                // 增加心动值
                heartValues[currentCharacter] = Math.min(heartValues[currentCharacter] + 1, 10);
                
                // 更新对话
                document.getElementById('dialogue').innerText = dialogues[currentCharacter][action];
                
                // 更新心形
                updateHearts();
                
                // 检查结局
                if (checkEnding()) {
                    document.getElementById('dialogue').innerText = dialogues[currentCharacter]['ending'];
                }
            });
        });

        // 重置游戏
        document.getElementById('resetBtn').addEventListener('click', () => {
            heartValues = {
                '萧哥': 0,
                '深岚': 0,
                '小蓝': 0,
                '阿深': 0
            };
            currentCharacter = null;
            gameEnded = false;
            
            document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('dialogue').innerText = '选择一个你想约会的AI吧 💕';
            document.getElementById('endingMessage').style.display = 'none';
            
            updateHearts();
            
            document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = false);
        });

        // 初始化心形
        updateHearts();
    </script>
</body>
</html>
